version: "3.9"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: binarygate-website:latest
    environment:
      NODE_ENV: production
    expose:
      - "3000"

  nginx:
    image: nginx:stable-alpine
    depends_on:
      - app
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
